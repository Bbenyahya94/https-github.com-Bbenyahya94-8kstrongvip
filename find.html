<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Content – 8K Strong IPTV Search</title>
    <meta name="description" content="Search through thousands of channels, movies, and series available on 8K Strong IPTV. Find your favorite content instantly.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>/* same styles + extra for search */</style>
</head>
<body>
    <header class="header">...</header>

    <main class="container">
        <h1 class="section-title" data-i18n="find_title">Find Content</h1>
        <p style="text-align:center; color:var(--gray-600); margin-bottom:40px;" data-i18n="find_subtitle">Search through thousands of channels, movies, and series available on 8K Strong IPTV.</p>

        <div style="display:flex; gap:20px; margin-bottom:30px; flex-wrap:wrap;">
            <div style="flex:2; min-width:250px; position:relative;">
                <input type="text" id="searchInput" style="width:100%; padding:15px 20px; border-radius:50px; border:1px solid var(--gray-400); background:var(--gray-300); color:var(--gray-800);" placeholder="Search by name..." data-i18n-placeholder="find_search">
                <i class="fas fa-search" style="position:absolute; right:20px; top:50%; transform:translateY(-50%); color:var(--button-bg);"></i>
            </div>
            <div style="flex:1; min-width:200px;">
                <select id="groupFilter" style="width:100%; padding:15px 20px; border-radius:50px; border:1px solid var(--gray-400); background:var(--gray-300); color:var(--gray-800);">
                    <option value="all" data-i18n="find_all_groups">All Groups</option>
                </select>
            </div>
        </div>

        <div id="resultsInfo" style="margin:20px 0; color:var(--gray-600);" data-i18n="find_loading">Loading content...</div>
        <div class="content-grid" id="contentGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:20px;"></div>
    </main>

    <footer class="footer">...</footer>

    <script>
        // Copy the playlist parsing and search logic from earlier find.html (with translations)
        // ... (you can adapt from the previous find.html code)
    </script>
</body>
</html>
