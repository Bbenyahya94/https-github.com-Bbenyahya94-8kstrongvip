        * {

            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0b1a 0%, #1a1b2f 100%);
            color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: rgba(10, 11, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 50px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, #f6c654, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            padding: 8px 16px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .nav-menu a:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Page title */
        .page-title {
            text-align: center;
            font-size: 2.5em;
            margin: 40px 0 20px;
            color: #f6c654;
            text-shadow: 0 2px 10px rgba(246,198,84,0.3);
        }

        /* Two panels side by side */
        .selection-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .panel {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
        }

        .panel h2 {
            font-size: 1.8em;
            margin-bottom: 15px;
            color: #f6c654;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .panel h2 i {
            margin-right: 10px;
        }

        /* Search box */
        .search-box {
            margin-bottom: 20px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            padding-right: 45px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1em;
        }

        .search-box input:focus {
            outline: none;
            border-color: #f6c654;
        }

        .search-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #f6c654;
        }

        /* Table container with scroll */
        .table-container {
            max-height: 500px;
            overflow-y: auto;
            border-radius: 10px;
            scrollbar-width: thin;
            scrollbar-color: #f6c654 #1a1b2f;
        }

        .table-container::-webkit-scrollbar {
            width: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: #1a1b2f;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: #f6c654;
            border-radius: 10px;
        }

        .package-table {
            width: 100%;
            border-collapse: collapse;
        }

        .package-table tr {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.3s;
        }

        .package-table tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .package-table td {
            padding: 12px 5px;
            color: #ccc;
            font-size: 0.95em;
        }

        .package-table td:first-child {
            width: 80%;
        }

        .package-table td:last-child {
            text-align: center;
            width: 20%;
        }

        .package-table input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #f6c654;
            transform: scale(1.2);
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 50px 0 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2em;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: #f6c654;
            color: #0a0b1a;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(246,198,84,0.3);
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
        }

        .btn-whatsapp:hover {
            background: #128C7E;
        }

        /* Summary (optional) */
        .selection-summary {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .selection-summary h3 {
            color: #f6c654;
            margin-bottom: 10px;
        }

        #selectedCount {
            font-weight: bold;
            color: #f6c654;
            font-size: 1.2em;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 60px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: #888;
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 10px;
            }
            .selection-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        // Reference to tables
        const liveTbody = document.getElementById('liveTable');
        const vodTbody = document.getElementById('vodTable');

        // Render initial tables
        function renderLive(data) {
            liveTbody.innerHTML = '';
            data.forEach((item, index) => {
                const row = document.createElement('tr');
                // Use original index for data-index (needed for selection)
                const originalIndex = livePackages.indexOf(item);
                row.innerHTML = `<td>${item}</td><td><input type="checkbox" class="live-checkbox" data-index="${originalIndex}" onchange="updateSummary()"></td>`;
                liveTbody.appendChild(row);
            });
        }

        function renderVod(data) {
            vodTbody.innerHTML = '';
            data.forEach((item, index) => {
                const row = document.createElement('tr');
                const originalIndex = vodCategories.indexOf(item);
                row.innerHTML = `<td>${item}</td><td><input type="checkbox" class="vod-checkbox" data-index="${originalIndex}" onchange="updateSummary()"></td>`;
                vodTbody.appendChild(row);
            });
        }

        // Search functions
        document.getElementById('searchLive').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = livePackages.filter(item => item.toLowerCase().includes(term));
            renderLive(filtered);
        });

        document.getElementById('searchVod').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = vodCategories.filter(item => item.toLowerCase().includes(term));
            renderVod(filtered);
        });

        // Update summary counts
        function updateSummary() {
            const liveChecked = document.querySelectorAll('.live-checkbox:checked').length;
            const vodChecked = document.querySelectorAll('.vod-checkbox:checked').length;
            document.getElementById('selectedLiveCount').innerText = liveChecked;
            document.getElementById('selectedVodCount').innerText = vodChecked;
            document.getElementById('totalSelected').innerText = liveChecked + vodChecked;
        }

        // Initialize with full data
        renderLive(livePackages);
        renderVod(vodCategories);
    </script>
