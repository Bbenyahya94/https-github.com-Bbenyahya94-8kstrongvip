<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Packages & VOD – 8K Strong IPTV</title>
    <meta name="description" content="Browse all channel packages and VOD categories from your IPTV playlist.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0b1a 0%, #1a1b2f 100%);
            color: #fff;
            min-height: 100vh;
        }

        .header {
            background: rgba(10, 11, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
        }

        .logo img {
            height: 45px;
            width: auto;
        }

        .nav-menu {
            display: flex;
            gap: 20px;
        }

        .nav-menu a {
            color: #ced4da;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .nav-menu a:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: #ecb619;
        }

        .loading i {
            font-size: 48px;
            margin-bottom: 20px;
        }

        /* Stats Bar */
        .stats-bar {
            background: rgba(236, 182, 25, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #ecb619;
        }

        /* Selection Panel - Two Columns Layout */
        .selection-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
        }

        .panel h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #ecb619;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .panel h2 i {
            margin-right: 10px;
        }

        /* Search Box */
        .search-box {
            margin-bottom: 20px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            padding-right: 45px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #ecb619;
        }

        .search-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #ecb619;
        }

        /* Table Style */
        .table-container {
            max-height: 500px;
            overflow-y: auto;
            border-radius: 12px;
        }

        .package-table {
            width: 100%;
            border-collapse: collapse;
        }

        .package-table tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .package-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .package-table td {
            padding: 12px 8px;
            color: #ccc;
            font-size: 14px;
        }

        .package-table td:first-child {
            width: 80%;
        }

        .package-table td:last-child {
            text-align: center;
            width: 20%;
        }

        .package-table input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #ecb619;
            transform: scale(1.1);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ecb619, #d4a514);
            color: #0a0b1a;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-secondary {
            background: transparent;
            color: #ecb619;
            border: 2px solid #ecb619;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover, .btn-secondary:hover {
            transform: scale(1.02);
        }

        /* Summary */
        .summary {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            text-align: center;
        }

        .summary h3 {
            margin-bottom: 15px;
            color: #ecb619;
        }

        .summary-count {
            font-size: 2em;
            font-weight: bold;
            color: #ecb619;
        }

        .selected-list {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .selected-badge {
            background: rgba(236, 182, 25, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .error-box {
            text-align: center;
            padding: 40px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 20px;
            margin: 20px;
        }

        .footer {
            background: rgba(10, 11, 26, 0.95);
            padding: 30px;
            text-align: center;
            margin-top: 60px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #888;
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 10px;
            }
            .logo img {
                height: 35px;
            }
            .selection-panel {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="images/logo.png" alt="8K Strong IPTV">
        </div>
        <nav class="nav-menu">
            <a href="index.html">Home</a>
            <a href="packages.html">Packages</a>
            <a href="convert.html">Convert</a>
            <a href="find.html">Find Content</a>
            <a href="subscription.html">Subscription</a>
            <a href="reseller.html">Reseller</a>
            <a href="resolution.html">Resolution</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="container">
        <!-- Loading -->
        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin"></i><br>
            Loading playlist...
        </div>

        <!-- Content (hidden until loaded) -->
        <div id="content" style="display: none;">
            <!-- Stats Bar -->
            <div id="statsBar" class="stats-bar">
                <div class="stat-item"><i class="fas fa-tv"></i> <span id="totalChannels" class="stat-number">0</span> <span>Total Channels</span></div>
                <div class="stat-item"><i class="fas fa-layer-group"></i> <span id="totalPackages" class="stat-number">0</span> <span>Packages</span></div>
                <div class="stat-item"><i class="fas fa-film"></i> <span id="totalVOD" class="stat-number">0</span> <span>VOD Categories</span></div>
            </div>

            <!-- Selection Panel (Two Tables) -->
            <div class="selection-panel">
                <!-- Packages Table -->
                <div class="panel">
                    <h2><i class="fas fa-tv"></i> Select Package</h2>
                    <div class="search-box">
                        <input type="text" id="searchPackages" placeholder="Search packages...">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="table-container">
                        <table class="package-table" id="packagesTable">
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <!-- VOD Table -->
                <div class="panel">
                    <h2><i class="fas fa-film"></i> Select VOD</h2>
                    <div class="search-box">
                        <input type="text" id="searchVod" placeholder="Search VOD categories...">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="table-container">
                        <table class="package-table" id="vodTable">
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="btn-primary" onclick="getSelection()"><i class="fas fa-check-circle"></i> Confirm Selection</button>
                <button class="btn-secondary" onclick="resetSelection()"><i class="fas fa-undo-alt"></i> Reset All</button>
            </div>

            <!-- Summary -->
            <div class="summary">
                <h3>Your Selection Summary</h3>
                <div><span class="summary-count" id="selectedCount">0</span> items selected</div>
                <div id="selectedList" class="selected-list"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 8K Strong IPTV. All rights reserved.</p>
    </footer>

    <script>
        // ============================================================
        // ⚠️ EDIT YOUR M3U LINK HERE - ONLY THIS LINE ⚠️
        // ============================================================
        const M3U_LINK = 'http://meets14317.wd.business-cdn-8k.su/get.php?username=8d4889317f2e&password=36fec6b65c&type=m3u_plus&output=ts';
        // ============================================================

        let packagesData = [];
        let vodData = [];
        let selectedPackages = new Set();
        let selectedVod = new Set();
        let totalChannels = 0;
        let totalVOD = 0;

        // Load saved selections from localStorage
        function loadSavedSelections() {
            const saved = localStorage.getItem('iptv_selections');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    selectedPackages = new Set(data.selectedPackages || []);
                    selectedVod = new Set(data.selectedVod || []);
                } catch(e) {}
            }
        }

        function saveSelections() {
            const data = {
                selectedPackages: Array.from(selectedPackages),
                selectedVod: Array.from(selectedVod)
            };
            localStorage.setItem('iptv_selections', JSON.stringify(data));
        }

        async function loadM3U() {
            const loadingDiv = document.getElementById('loading');
            const contentDiv = document.getElementById('content');
            
            try {
                console.log('Fetching M3U from:', M3U_LINK);
                
                // Try direct fetch first, if fails try with proxy
                let response;
                try {
                    response = await fetch(M3U_LINK);
                    if (!response.ok) throw new Error('Direct fetch failed');
                } catch (directError) {
                    console.log('Direct fetch failed, trying proxy...');
                    const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(M3U_LINK);
                    response = await fetch(proxyUrl);
                }
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const content = await response.text();
                console.log('M3U loaded, size:', content.length, 'bytes');
                
                if (!content || content.length < 100) {
                    throw new Error('Playlist content is too short');
                }
                
                const parsed = parseM3U(content);
                packagesData = parsed.packages;
                vodData = parsed.vod;
                totalChannels = parsed.totalChannels;
                totalVOD = parsed.totalVOD;
                
                // Load saved selections
                loadSavedSelections();
                
                // Display UI
                displayUI();
                
                loadingDiv.style.display = 'none';
                contentDiv.style.display = 'block';
                
            } catch (error) {
                console.error('Error loading playlist:', error);
                loadingDiv.innerHTML = `
                    <div class="error-box">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Playlist</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 15px; font-size: 12px;">Please check your M3U link.</p>
                        <p style="margin-top: 10px;"><small>M3U Link: ${M3U_LINK.substring(0, 80)}...</small></p>
                    </div>
                `;
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            const packagesMap = new Map();
            const vodMap = new Map();
            let totalChannelsCount = 0;
            let totalVODCount = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF')) {
                    let name = '';
                    const nameMatch = line.match(/#EXTINF:-?[^,]*,?(.+)/);
                    if (nameMatch) name = nameMatch[1].trim();
                    
                    let group = 'Other';
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    if (groupMatch && groupMatch[1]) group = groupMatch[1];
                    
                    const isVOD = isVODContent(name, group);
                    
                    if (i + 1 < lines.length && !lines[i+1].startsWith('#')) {
                        totalChannelsCount++;
                        
                        if (isVOD) {
                            totalVODCount++;
                            let vodCat = getVODCategory(name, group);
                            if (!vodMap.has(vodCat)) {
                                vodMap.set(vodCat, { count: 0, name: vodCat });
                            }
                            vodMap.get(vodCat).count++;
                        } else {
                            if (!packagesMap.has(group)) {
                                packagesMap.set(group, { count: 0, name: group });
                            }
                            packagesMap.get(group).count++;
                        }
                    }
                }
            }
            
            const packages = Array.from(packagesMap.values()).map((p, index) => ({
                id: index,
                name: p.name,
                count: p.count
            })).sort((a, b) => b.count - a.count);
            
            const vod = Array.from(vodMap.values()).map((v, index) => ({
                id: index,
                name: v.name,
                count: v.count
            })).sort((a, b) => b.count - a.count);
            
            return {
                packages: packages,
                vod: vod,
                totalChannels: totalChannelsCount,
                totalVOD: totalVODCount
            };
        }

        function isVODContent(name, group) {
            const lowerName = name.toLowerCase();
            const lowerGroup = group.toLowerCase();
            const vodKeywords = ['movie', 'film', 'series', 'vod', 'netflix', 'disney', 'hbo', 'amazon', 'apple', 'paramount', 'showtime', 'dreamworks', 'universal'];
            for (const keyword of vodKeywords) {
                if (lowerName.includes(keyword) || lowerGroup.includes(keyword)) return true;
            }
            return false;
        }

        function getVODCategory(name, group) {
            const lowerName = name.toLowerCase();
            const lowerGroup = group.toLowerCase();
            if (lowerName.includes('netflix') || lowerGroup.includes('netflix')) return 'Netflix';
            if (lowerName.includes('disney') || lowerGroup.includes('disney')) return 'Disney+';
            if (lowerName.includes('hbo') || lowerGroup.includes('hbo')) return 'HBO Max';
            if (lowerName.includes('amazon') || lowerGroup.includes('amazon')) return 'Amazon Prime';
            if (lowerName.includes('apple') || lowerGroup.includes('apple')) return 'Apple TV+';
            if (lowerName.includes('paramount') || lowerGroup.includes('paramount')) return 'Paramount+';
            if (lowerName.includes('series')) return 'TV Series';
            if (lowerName.includes('movie')) return 'Movies';
            return group;
        }

        function displayUI() {
            document.getElementById('totalChannels').innerText = totalChannels;
            document.getElementById('totalPackages').innerText = packagesData.length;
            document.getElementById('totalVOD').innerText = vodData.length;
            
            renderPackagesTable(packagesData);
            renderVodTable(vodData);
            updateSummary();
        }

        function renderPackagesTable(items) {
            const tbody = document.querySelector('#packagesTable tbody');
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td>${escapeHtml(item.name)}</td>
                    <td><input type="checkbox" class="package-checkbox" data-id="${item.id}" onchange="togglePackage(${item.id})" ${selectedPackages.has(item.id) ? 'checked' : ''}></td>
                </tr>
            `).join('');
        }

        function renderVodTable(items) {
            const tbody = document.querySelector('#vodTable tbody');
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td>${escapeHtml(item.name)}</td>
                    <td><input type="checkbox" class="vod-checkbox" data-id="${item.id}" onchange="toggleVod(${item.id})" ${selectedVod.has(item.id) ? 'checked' : ''}></td>
                </tr>
            `).join('');
        }

        function togglePackage(id) {
            if (selectedPackages.has(id)) {
                selectedPackages.delete(id);
            } else {
                selectedPackages.add(id);
            }
            saveSelections();
            updateSummary();
        }

        function toggleVod(id) {
            if (selectedVod.has(id)) {
                selectedVod.delete(id);
            } else {
                selectedVod.add(id);
            }
            saveSelections();
            updateSummary();
        }

        function updateSummary() {
            const total = selectedPackages.size + selectedVod.size;
            document.getElementById('selectedCount').innerText = total;
            
            const selectedItems = [];
            selectedPackages.forEach(id => {
                const pkg = packagesData.find(p => p.id === id);
                if (pkg) selectedItems.push(`<span class="selected-badge">📺 ${pkg.name}</span>`);
            });
            selectedVod.forEach(id => {
                const vod = vodData.find(v => v.id === id);
                if (vod) selectedItems.push(`<span class="selected-badge">🎬 ${vod.name}</span>`);
            });
            
            document.getElementById('selectedList').innerHTML = selectedItems.join('') || '<span style="color:#666;">No items selected</span>';
        }

        function resetSelection() {
            selectedPackages.clear();
            selectedVod.clear();
            renderPackagesTable(packagesData);
            renderVodTable(vodData);
            updateSummary();
            saveSelections();
        }

        function getSelection() {
            const selectedPackagesList = Array.from(selectedPackages).map(id => {
                const pkg = packagesData.find(p => p.id === id);
                return pkg ? pkg.name : '';
            }).filter(Boolean);
            
            const selectedVodList = Array.from(selectedVod).map(id => {
                const vod = vodData.find(v => v.id === id);
                return vod ? vod.name : '';
            }).filter(Boolean);
            
            let message = '📺 SELECTED PACKAGES:\n';
            message += selectedPackagesList.length > 0 ? selectedPackagesList.join('\n') : 'None';
            message += '\n\n🎬 SELECTED VOD:\n';
            message += selectedVodList.length > 0 ? selectedVodList.join('\n') : 'None';
            message += `\n\n📊 TOTAL: ${selectedPackagesList.length + selectedVodList.length} items selected`;
            message += '\n\n✅ Thank you! We will contact you shortly.';
            
            alert(message);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Search functionality
        document.getElementById('searchPackages').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = packagesData.filter(p => p.name.toLowerCase().includes(term));
            renderPackagesTable(filtered);
        });

        document.getElementById('searchVod').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = vodData.filter(v => v.name.toLowerCase().includes(term));
            renderVodTable(filtered);
        });

        // Load M3U on page load
        loadM3U();
    </script>
</body>
</html>
